site_name: Grokking Algorithms — Guia de Estudos
site_description: Site de estudos em português sobre o livro "Grokking Algorithms" (Aditya Bhargava).
site_author: Luis Abrantes
docs_dir: docs

repo_url: https://github.com/LuisAbrantes/grokkingAlgorithms
repo_name: LuisAbrantes/grokkingAlgorithms
edit_uri: edit/main/docs/

theme:
  name: material
  language: pt
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.footer
    - navigation.indexes
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Mudar para o modo escuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Mudar para o modo claro
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      lang: pt

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true
      title: Nesta página
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Início: index.md
  - Guia de estudos: guia-de-estudos.md
  - Capítulos:
      - 1. Introdução e busca binária: capitulos/01-introducao-busca-binaria.md
      - 2. Selection sort: capitulos/02-selection-sort.md
      - 3. Recursão: capitulos/03-recursao.md
      - 4. Quicksort: capitulos/04-quicksort.md
      - 5. Tabelas hash: capitulos/05-tabelas-hash.md
      - 6. Busca em largura (BFS): capitulos/06-busca-em-largura.md
      - 7. Algoritmo de Dijkstra: capitulos/07-dijkstra.md
      - 8. Algoritmos gulosos: capitulos/08-algoritmos-gulosos.md
      - 9. Programação dinâmica: capitulos/09-programacao-dinamica.md
      - 10. K-vizinhos mais próximos: capitulos/10-k-vizinhos-mais-proximos.md
      - 11. Algoritmos de grafos: capitulos/11-algoritmos-de-grafos.md
      - 12. Próximos passos: capitulos/12-proximos-passos.md
  - Referência:
      - Big-O (cheatsheet): referencia/big-o-cheatsheet.md
      - Glossário PT/EN: referencia/glossario.md
  - FAQ / Tirar dúvidas: faq-duvidas.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/LuisAbrantes/grokkingAlgorithms

copyright: >
  Material de estudos pessoal sobre "Grokking Algorithms" de Aditya Bhargava.
  Os conceitos pertencem ao autor/editora; este site é um resumo de estudo.
